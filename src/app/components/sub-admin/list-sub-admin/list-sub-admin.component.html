<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-body">
                    <div class="mat-elevation-z8">
                        <div>
                          <input class="form-control search" (keyup)="applyFilter($event)" placeholder="Search">
                        </div>
            
                        <table mat-table [dataSource]="dataSource" matSort>
            
                          <ng-container matColumnDef="name">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header>Sub Admin Name</th>
                            <td mat-cell *matCellDef="let element">{{element.name}} </td>
                          </ng-container>
            
                          <ng-container matColumnDef="email">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header>Sub Admin Email</th>
                            <td mat-cell *matCellDef="let element"> {{element.email}} </td>
                          </ng-container>
            
                          <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header>Status & Module Access</th>
                            <td mat-cell *matCellDef="let element"> 

                                <span *ngIf="isAdmin"><a (click)="statusChange(element)">
                                    <span [className]="element.status == 'active' ? 'text-center cursor-pointer label p-2 label-success mr-2' : 'label p-2 cursor-pointer label-danger mr-2'" data-toggle="tooltip"
                                    data-placement="top" title="Click">{{element.status}}</span>
                                </a>
                                </span>
                                
                                <span *ngIf="!isAdmin"><span [className]="element.status == 'active' ? 'text-center cursor-pointer label p-2 label-success mr-2' : 'label p-2 cursor-pointer label-danger mr-2'">{{element.status}}</span></span>
                                
                                <span (click)="moduleAccessChange(element)" class="text-center cursor-pointer label p-2 label-success">Module access</span>

                            </td>
                          </ng-container>
            
                          <!-- Actions Column -->
                          <ng-container matColumnDef="actions">
                            <th mat-header-cell *matHeaderCellDef> Actions </th>
                            <td mat-cell *matCellDef="let element">
                              <button mat-icon-button (click)="edit(element)" matTooltip="Edit Sub Admin">
                                <mat-icon>edit</mat-icon>
                              </button>
                              <button mat-icon-button (click)="delete(element)" matTooltip="Delete Sub Admin">
                                <mat-icon>delete</mat-icon>
                              </button>
                            </td>
                          </ng-container>
            
                          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                        </table>
            
                        <mat-paginator [length]="totalSubadmin" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 20]"
                        (page)="onPageChange($event)" showFirstLastButtons>
                      </mat-paginator>
                      </div>
                </div>
            </div>
        </div>
    </div>
</div>
