<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-body">
                    <table class="table">
                        <thead class="thead-light">
                            <tr>
                                <th scope="col " class="w-15">Banner Image</th>
                                <th scope="col">Banner Heading</th>
                                <th scope="col">Banner Sub Heading</th>
                                <th scope="col">Banner Status</th>
                                <th *ngIf="vendorType !== 'access'" scope="col" class="w-10">Action</th>
                            </tr>
                        </thead>
                        <tbody *ngIf="banneravailable">
                            <tr *ngFor="let banner of bannerLists">
                                <th><img src="{{banner.banner_background_image}}" class="img-fluid banner-img"></th>
                                <th>{{banner.banner_title}}</th>
                                <td>{{banner.banner_subtitle}}</td>
                                <td *ngIf="banner.status == 'active' "><span
                                        [className]="banner.status == 'active' ? 'text-center  label p-1 label-success' : 'label p-1  label-danger'"
                                        data-toggle="tooltip" data-placement="top"
                                        title="Active">{{banner.status}}</span></td>
                                <td *ngIf="banner.status == 'pending' "><span
                                        [className]="banner.status == 'active' ? 'text-center  label p-1 label-success' : 'label p-1  label-danger'"
                                        data-toggle="tooltip" data-placement="top"
                                        title="Pending">{{banner.status}}</span></td>

                                <td *ngIf="vendorType!=='access'"><a class="text-success edit mr-2" (click)="edit_banner(banner._id)"><i
                                            class="fa fa-pencil" aria-hidden="true"></i></a><a
                                        class="text-danger delete" (click)="delete_banner(banner._id)"><i
                                            class="fa fa-trash" aria-hidden="true"></i></a></td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="text-center" *ngIf="!banneravailable">
                        <h3 class="text-center">No Home Banner Available</h3>
                    </div>
                </div>
            </div>
        </div>

        <ng-template #bannerDelete>
            <div class="modal-content warning_popup ">
                <h3 class="modal-title text-center"><span>WARNING!</span></h3>
                <div class="warning_msg">
                    <div class="modal-header">
                        <button type="button" class="close_modal">
                            <img src="assets/images/close.webp" width="24" alt="" [mat-dialog-close]="true">
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="text-center">

                        <p>Are you sure you want to delete this ? It will delete all data related to this. Be careful!

                        </p>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <div class="d-flex">
                            <button [mat-dialog-close]="true" (click)="deleteConfirm()"
                                class="btn btn-danger">Yes</button>
                            <button [mat-dialog-close]="true" class="btn btn-sucess">No</button>
                        </div>
                    </div>
                </div>

            </div>
        </ng-template>
    </div>
</div>
