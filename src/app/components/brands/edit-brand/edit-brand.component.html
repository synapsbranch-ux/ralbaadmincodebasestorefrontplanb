<div class="container-fluid">
    <form [formGroup]="brandSubmitForm" (ngSubmit)="onBrandEdit()">
        <div class="row product-adding">
            <div class="col-xl-6">
                <div class="card">
                    <div class="card-body">
                        <div class="digital-add needs-validation">

                            <div class="form-group">
                                <label for="validationCustom01" class="col-form-label pt-0"><span>*</span> Brand
                                    Name</label>
                                <input class="form-control" id="validationCustom01" type="text" ngModel="{{brandname}}"
                                    required="" formControlName="brand_name">
                                <div *ngIf="brand_name.invalid && (brand_name.dirty || brand_name.touched)"
                                    class="text text-danger mt-1">
                                    <div *ngIf="brand_name.errors?.required">
                                        Brand name is required.
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-form-label" for="prd_4"><span>*</span> Categories</label>
                                <ng-select [clearSearchOnAdd]="true" formControlName="selctedcategories"
                                    bindLabel="category_name" [multiple]="true" [closeOnSelect]="false" [items]="catagoriesList" [(ngModel)]="selectedCategory" ></ng-select>
                            </div>
                            <label class="col-form-label pt-0">Brand Image Upload (jpg, jpeg, png)</label>
                            <span class="pl-2">
                                <a href="javascrip:void(0)" (click)="open(content)">Upload guidelines</a>
                            </span>
                            <div class="card-body dropzone-custom p-0">
                                <div class="dropzone dropzone-primary" [dropzone]="config"
                                    (error)="onUploadError($event)" (success)="onUploadSuccess($event)">
                                    <div class="dz-message needsclick">
                                        <i class="fa fa-cloud-upload"></i>
                                        <h4 class="mb-0 f-w-600">Drop files here or click to upload.</h4>
                                    </div>
                                </div>
                            </div>
                            <div class="department-images">
                                <img class="img-fluid p-2" src="{{brand_image}}" alt="{{brandname}}">
                            </div>

                            <div class="form-group mb-0 mt-4">
                                <div class="product-buttons text-center">
                                    <button [disabled]="brandSubmitForm.invalid"
                                        class="btn btn-primary mr-1" type="submit">Update</button>
                                </div>
                            </div>

                            <div [className]="brandinsertValid ? 'alert w-75 mx-auto mt-3 alert-success' : 'alert w-75 mx-auto mt-3 alert-danger'"
                                role="alert" *ngIf="brandinsertValid">
                                <div class="d-flex align-items-center justify-content-center">{{brandinsertMessage}}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<ng-template #content let-modal>
    <div class="modal-header">
        <h4 class="modal-title" id="modal-basic-title">Image upload Instruction</h4>
        <button type="button" class="close" aria-label="Close" (click)="modal.dismiss('Cross click')">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    <div class="modal-body">
        <h4><b>Image type:</b> JPG, JPEG, PNG </h4>
        <h4>Image must be upload under 5MB </h4>
        <h3>Image Height : 400px and Width : 400px</h3>
    </div>
    <div class="modal-footer">

    </div>
</ng-template>
