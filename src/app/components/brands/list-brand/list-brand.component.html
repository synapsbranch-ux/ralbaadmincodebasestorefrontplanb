<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-body">
                    <div class="mat-elevation-z8">
                        <div>
                          <input class="form-control search" (keyup)="applyFilter($event)" placeholder="Search">
                        </div>
            
                        <table mat-table [dataSource]="dataSource" matSort>
            
                          <ng-container matColumnDef="brand_image">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header> Brand Image </th>
                            <td mat-cell *matCellDef="let element"><img src="{{element.brand_image?element.brand_image:'assets/images/cat3.png'}}" alt="" width="100px"> </td>
                          </ng-container>
            
                          <ng-container matColumnDef="brand_name">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header> Brand Name </th>
                            <td mat-cell *matCellDef="let element"> {{element.brand_name}} </td>
                          </ng-container>
            
                          <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header> Brand Status </th>
                            <td mat-cell *matCellDef="let element">
                                <span *ngIf="isAdmin"><a (click)="statusChange(element)">
                                    <span [className]="element.status == 'active' ? 'text-center cursor-pointer label p-1 label-success' : 'label p-1 cursor-pointer label-danger'" data-toggle="tooltip"
                                    data-placement="top" title="Click">{{element.status}}</span>
                                </a>
                                </span>
                                
                                <span  *ngIf="!isAdmin"><span [className]="element.status == 'active' ? 'text-center cursor-pointer label p-1 label-success' : 'label p-1 cursor-pointer label-danger'">{{element.status}}</span></span>

                            </td>
                          </ng-container>
            
                          <!-- Actions Column -->
                          <ng-container matColumnDef="actions">
                            <th mat-header-cell *matHeaderCellDef> Actions </th>
                            <td mat-cell *matCellDef="let element">
                              <button mat-icon-button (click)="edit(element)" matTooltip="Edit Brand">
                                <mat-icon>edit</mat-icon>
                              </button>
                              <button mat-icon-button (click)="delete(element)" matTooltip="Delete Brand">
                                <mat-icon>delete</mat-icon>
                              </button>
                            </td>
                          </ng-container>
            
                          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                        </table>
            
                        <mat-paginator [length]="totalBrands" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 20]"
                                 (page)="onPageChange($event)" showFirstLastButtons>
                                </mat-paginator>
                      </div>
                </div>
            </div>
        </div>

        <!-- Dialog template -->

        <ng-template #brandDelete>
            <div class="modal-content warning_popup ">
                <h3 class="modal-title text-center"><span>WARNING!</span></h3>
                <div class="warning_msg">
                    <div class="modal-header">
                        <button type="button" class="close_modal">
                            <img src="assets/images/close.webp" width="24" alt="" [mat-dialog-close]="true">
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="text-center">
                            <p>Are you sure to delete "BRAND" ? it will delete all data related to this "BRAND". Be careful ! </p>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <div class="d-flex">
                            <button [mat-dialog-close]="true" (click)="deleteConfirm()" class="btn btn-danger">Yes</button>
                            <button [mat-dialog-close]="true" class="btn btn-sucess">No</button>
                        </div>
                    </div>
                </div>

            </div>
        </ng-template>

    </div>
</div>
