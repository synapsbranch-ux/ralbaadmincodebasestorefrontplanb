<a (click)="statusChange()">
    <span *ngIf="vendor_status_name == 'active'" [className]="vendor_status_name == 'active' ? 'text-center cursor-pointer label p-2 label-success' : 'label p-2 cursor-pointer label-danger'" data-toggle="tooltip" data-placement="top" title="Click to Pending">{{vendor_status_name}}</span>
    <span *ngIf="vendor_status_name == 'pending'" [className]="vendor_status_name == 'active' ? 'text-center cursor-pointer label p-2 label-success' : 'label p-2 cursor-pointer label-danger'" data-toggle="tooltip" data-placement="top" title="Click to Active">{{vendor_status_name}}</span>
</a>
