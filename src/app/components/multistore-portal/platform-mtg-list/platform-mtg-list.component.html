<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5>Platform MTGs</h5>
                    <p class="text-muted mb-0">Browse all active MTGs on the platform and add them to your store</p>
                </div>
                <div class="card-body">
                    <!-- Loading -->
                    <div *ngIf="isLoading" class="text-center py-4">
                        <div class="spinner-border text-primary"></div>
                    </div>

                    <!-- MTG Grid -->
                    <div *ngIf="!isLoading" class="row">
                        <div class="col-md-4 col-sm-6 mb-3" *ngFor="let mtg of platformMTGs">
                            <div class="card h-100">
                                <img [src]="mtg.section_image" class="card-img-top"
                                     style="height: 150px; object-fit: cover;"
                                     *ngIf="mtg.section_image" [alt]="mtg.heading_text">
                                <div class="card-body p-2">
                                    <h6 class="card-title mb-1">{{ mtg.heading_text }}</h6>
                                    <p class="card-text small text-muted mb-1">{{ mtg.description_text | slice:0:80 }}...</p>
                                    <small class="text-info">By: {{ getVendorName(mtg) }}</small>
                                </div>
                                <div class="card-footer p-2">
                                    <button class="btn btn-sm w-100"
                                            [ngClass]="addedMTGIds.has(mtg._id) ? 'btn-secondary' : 'btn-outline-primary'"
                                            [disabled]="addedMTGIds.has(mtg._id) || addingMTGId === mtg._id"
                                            (click)="addToMyStore(mtg)">
                                        <span *ngIf="addingMTGId === mtg._id">Adding...</span>
                                        <span *ngIf="addingMTGId !== mtg._id && addedMTGIds.has(mtg._id)">Already Added</span>
                                        <span *ngIf="addingMTGId !== mtg._id && !addedMTGIds.has(mtg._id)">Add to My Store</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div *ngIf="platformMTGs.length === 0" class="col-12 text-center text-muted py-4">
                            No platform MTGs available
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
