<div class="container-fluid">
<div class="row product-adding">

<div class="col-xl-6">
    <div class="card">
    <div class="card-body">
        <div class="digital-add needs-validation">
            <div class="form-group">
                <label class="col-form-label">Add To Cart Hide</label>
                <div class="m-checkbox-inline mb-0 custom-checkbox-ml d-flex checkbox-animated">
                    <label class="d-block" for="edo-ani">
                        <input class="checkbox_animated" id="edo-ani" value="{{addtocartStatus}}" type="checkbox" [checked]="addtocartStatus == 'active'" (click)="hideaddtoCart($event.target.value)">
                        Hide Button
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="col-form-label">Quantity Hide</label>
                <div class="m-checkbox-inline mb-0 custom-checkbox-ml d-flex checkbox-animated">
                    <label class="d-block" for="edo-ani">
                        <input class="checkbox_animated" id="edo-ani" value="{{quentityStatus}}" type="checkbox" [checked]="quentityStatus == 'active'" (click)="hidequentity($event.target.value)">
                        Hide Quantity Section
                    </label>
                </div>
            </div>
                
        </div>
    </div>
    </div>  
    
    </div> 
    
</div>
</div>
