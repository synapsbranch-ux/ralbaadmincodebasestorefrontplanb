<div class="container-fluid">
  <div class="row">
      <div class="col-sm-7">
          <div class="card">
              <div class="card-body">
                <div class="mat-elevation-z8">
                    <div>
                        <input class="form-control search" (keyup)="applyFilter($event)" placeholder="Search">
                    </div>

                    <table mat-table [dataSource]="dataSource" matSort>

                        <ng-container matColumnDef="category_name">
                            <th mat-header-cell *matHeaderCellDef mat-sort-header>Sub Catagories Name </th>
                            <td mat-cell *matCellDef="let element"> {{element.category_name}} </td>
                        </ng-container>

                        <!-- Actions Column -->
                        <ng-container matColumnDef="subCategory">
                            <th mat-header-cell *matHeaderCellDef>View Child Category </th>
                            <td mat-cell *matCellDef="let element">
                                <button mat-icon-button (click)="viewChildCategory(element)" matTooltip="View Child Category">
                                    <mat-icon>visibility</mat-icon>
                                </button>
                            </td>
                        </ng-container>

                        <!-- Actions Column -->
                        <ng-container matColumnDef="actions">
                            <th mat-header-cell *matHeaderCellDef> Actions </th>
                            <td mat-cell *matCellDef="let element">
                                <button mat-icon-button (click)="edit(element)" matTooltip="Edit Sub Category">
                                    <mat-icon>edit</mat-icon>
                                </button>
                                <button mat-icon-button (click)="delete(element)" matTooltip="Delete Sub Category">
                                    <mat-icon>delete</mat-icon>
                                </button>
                            </td>
                        </ng-container>

                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                    </table>

                    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
                </div>
              </div>
          </div>
      </div>
      <div class="col-sm-5">
        
        <form [formGroup]="subCatagoriesSubmitForm" (ngSubmit)="onSubCatagoriesSubmit()">
            <div class="card">
                <div class="card-header">
                    <h3>Add Sub/Child Category</h3>
                </div>
                <div class="card-body">
                    <div class="digital-add needs-validation">
                        <div class="form-group">
                            <label for="validationCustom01" class="col-form-label pt-0"><span>*</span>Sub Category Name</label>
                            <input class="form-control" id="validationCustom01" type="text" [ngModel]="categoryName" formControlName="sub_catagories_name" (keydown)="handleEnter($event, 'uploadattribute')">
                            <div *ngIf="sub_catagories_name.invalid && (sub_catagories_name.dirty || sub_catagories_name.touched)" class="text text-danger mt-1">
                                <div *ngIf="sub_catagories_name.errors?.required">
                                    Sub Category Name is required.
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-0 mt-4">
                            <div class="product-buttons text-center">
                                <button  type="submit"  class="btn btn-primary mr-2">{{isFormEdit? 'Update': 'Add'}}</button>
                                <button type="reset" class="btn btn-light">Discard</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </form>
      </div>
  </div>
</div>

        <!-- Dialog template -->

        <ng-template #subcatagoriesDelete>
            <div class="modal-content warning_popup ">
                <h3 class="modal-title text-center"><span>WARNING!</span></h3>
                <div class="warning_msg">
                    <div class="modal-header">
                        <button type="button" class="close_modal">
                            <img src="assets/images/close.webp" width="24" alt="" [mat-dialog-close]="true">
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="text-center">
                            <p>Are you sure you want to delete this "CATEGORY"? It will delete all data related to this "CATEGORY". Be careful!</p>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <div class="d-flex">
                            <button [mat-dialog-close]="true" (click)="deleteConfirm()" class="btn btn-danger">Yes</button>
                            <button [mat-dialog-close]="true" class="btn btn-sucess">No</button>
                        </div>
                    </div>
                </div>

            </div>
        </ng-template>
