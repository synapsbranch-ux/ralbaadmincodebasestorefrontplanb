<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-body">
                    <div class="mat-elevation-z8">
                        <div>
                            <input class="form-control search" (keyup)="applyFilter($event)" placeholder="Search">
                        </div>

                        <table mat-table [dataSource]="dataSource" matSort>

                            <ng-container matColumnDef="category_image">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Catagories Image </th>
                                <td mat-cell *matCellDef="let element"><img src="{{element.category_image}}" alt=""
                                        width="100px"> </td>
                            </ng-container>

                            <ng-container matColumnDef="category_name">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Catagories Name </th>
                                <td mat-cell *matCellDef="let element"> {{element.category_name}} </td>
                            </ng-container>

                            <ng-container matColumnDef="status">
                                <th mat-header-cell *matHeaderCellDef mat-sort-header> Catagories Status </th>
                                <td mat-cell *matCellDef="let element"> {{element.status}} </td>
                            </ng-container>

                            <!-- Actions Column -->
                            <ng-container matColumnDef="subCategory">
                                <th mat-header-cell *matHeaderCellDef> Sub Category </th>
                                <td mat-cell *matCellDef="let element">
                                    <button mat-icon-button (click)="viewSubCategory(element)"
                                        matTooltip="View SubCategory">
                                        <mat-icon>visibility</mat-icon>
                                    </button>
                                </td>
                            </ng-container>
                            <!-- Actions Column -->
                            <ng-container matColumnDef="actions">
                                <th mat-header-cell *matHeaderCellDef> Actions </th>
                                <td mat-cell *matCellDef="let element">
                                    <button mat-icon-button (click)="edit(element)" matTooltip="Edit Category">
                                        <mat-icon>edit</mat-icon>
                                    </button>
                                </td>
                            </ng-container>

                            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                        </table>
                        <mat-paginator [length]="totalCategory" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 20]"
                                 (page)="onPageChange($event)" showFirstLastButtons>
                                </mat-paginator>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Dialog template -->

<ng-template #catagoriesDelete>
    <div class="modal-content warning_popup ">
        <h3 class="modal-title text-center"><span>WARNING!</span></h3>
        <div class="warning_msg">
            <div class="modal-header">
                <button type="button" class="close_modal">
                    <img src="assets/images/close.webp" width="24" alt="" [mat-dialog-close]="true">
                </button>
            </div>
            <div class="modal-body">
                <div class="text-center">
                    <p>Are you sure you want to delete this "CATEGORY"? It will delete all data related to this
                        "CATEGORY". Be careful!

                    </p>
                </div>
            </div>
            <div class="modal-footer">
                <div class="d-flex">
                    <button [mat-dialog-close]="true" (click)="deleteConfirm()" class="btn btn-danger">Yes</button>
                    <button [mat-dialog-close]="true" class="btn btn-sucess">No</button>
                </div>
            </div>
        </div>

    </div>
</ng-template>
