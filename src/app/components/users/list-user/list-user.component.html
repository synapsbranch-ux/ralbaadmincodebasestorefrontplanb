<div class="container-fluid">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-body">
                    <div class="category-table custom-datatable transcation-datatable user-image">
                        <div class="table-responsive">
                            <div class="mat-elevation-z8">
                                <div>
                                    <input class="form-control search" (keyup)="applyFilter($event)"
                                        placeholder="Search">
                                </div>

                                <table mat-table [dataSource]="dataSource" matSort>

                                    <ng-container matColumnDef="name">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-center"> User
                                            Name</th>
                                        <td mat-cell *matCellDef="let element">{{element.name}} </td>
                                    </ng-container>

                                    <ng-container matColumnDef="phone">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>User Phone</th>
                                        <td mat-cell *matCellDef="let element"> {{element.phone}} </td>
                                    </ng-container>

                                    <ng-container matColumnDef="email">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>User Email</th>
                                        <td mat-cell *matCellDef="let element"> {{element.email}} </td>
                                    </ng-container>

                                    <ng-container matColumnDef="createdAt">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>Register Date</th>
                                        <td mat-cell *matCellDef="let element"> {{element.createdAt | date: 'dd MMM
                                            yyyy' }} </td>
                                    </ng-container>

                                    <ng-container matColumnDef="status">
                                        <th mat-header-cell *matHeaderCellDef mat-sort-header>User Status</th>
                                        <td mat-cell *matCellDef="let element">
                                            <button (click)="statusChange(element)"
                                                [className]="element.status == 'active' ? 'btn btn-xs btn-success' : 'btn btn-xs btn-danger'">{{element.status}}</button>
                                        </td>
                                    </ng-container>

                                    <ng-container matColumnDef="viewOrder">
                                        <th mat-header-cell *matHeaderCellDef> View Order </th>
                                        <td mat-cell *matCellDef="let element">
                                            <button mat-icon-button (click)="view(element)" matTooltip="View Order">
                                                <mat-icon>visibility</mat-icon>
                                            </button>
                                        </td>
                                    </ng-container>

                                    <!-- Actions Column -->
                                    <ng-container matColumnDef="actions">
                                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                                        <td mat-cell *matCellDef="let element">
                                            <button mat-icon-button (click)="edit(element)" matTooltip="Edit Category">
                                                <mat-icon>edit</mat-icon>
                                            </button>
                                        </td>
                                    </ng-container>

                                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                                </table>

                                <mat-paginator [length]="totalUsers" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 20]"
                                 (page)="onPageChange($event)" showFirstLastButtons>
                                </mat-paginator>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
