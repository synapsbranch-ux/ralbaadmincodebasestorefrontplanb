<div class="container-fluid">
    <form [formGroup]="addonsSubmitForm" (ngSubmit)="onStoreEdit()">
        <div class="row product-adding">
            <div class="col-xl-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Category Add Ons</h5>
                    </div>
                    <div class="card-body">
                        <div class="digital-add needs-validation">

                            <div *ngFor="let item of addonsjsonData">
                                <div class="form-group">
                                    <label class="col-form-label font-weight-bold">
                                        <span *ngIf="item.is_mandatory">*</span> {{ item.add_ons_name }}
                                    </label>
                                    <ng-container [ngSwitch]="item.add_ons_input">
                                        <input class="form-control" *ngSwitchCase="'input'" type="text" disabled>
                                        <input class="form-control" *ngSwitchCase="'input'" type="text"
                                            [formControlName]="getFormControlName(item.add_ons_name+'_addons')"
                                            [ngModel]="getAddonValue(getFormControlName(item.add_ons_name+'_addons'))"
                                            placeholder="ex:100">

                                        <input class="form-control" *ngSwitchCase="'range'" type="range" disabled>
                                        <input class="form-control" *ngSwitchCase="'range'" type="text"
                                            [formControlName]="getFormControlName(item.add_ons_name+'_addons')"
                                            [ngModel]="getAddonValue(getFormControlName(item.add_ons_name+'_addons'))"
                                            placeholder="ex:100">

                                        <div *ngSwitchCase="'range-input'">
                                            <input class="form-control" type="range" disabled>
                                            <input class="form-control" type="text" disabled>
                                            <input class="form-control" type="text"
                                                [formControlName]="getFormControlName(item.add_ons_name+'_addons')"
                                                [ngModel]="getAddonValue(getFormControlName(item.add_ons_name+'_addons'))"
                                                placeholder="ex:100">
                                        </div>
                                        <input class="form-control" *ngSwitchCase="'video'" type="text"
                                            placeholder="Video URL"
                                            [formControlName]="getFormControlName(item.add_ons_name+'_addons')"
                                            [ngModel]="getAddonValue(getFormControlName(item.add_ons_name+'_addons'))">

                                        <input class="form-control" *ngSwitchCase="'file'" type="text"
                                            [formControlName]="getFormControlName(item.add_ons_name+'_addons')"
                                            [ngModel]="getAddonValue(getFormControlName(item.add_ons_name+'_addons'))"
                                            placeholder="ex:100">

                                        <textarea class="form-control" *ngSwitchCase="'textarea'" disabled></textarea>
                                        <input class="form-control" *ngSwitchCase="'textarea'" type="text"
                                            [formControlName]="getFormControlName(item.add_ons_name+'_addons')"
                                            [ngModel]="getAddonValue(getFormControlName(item.add_ons_name+'_addons'))"
                                            placeholder="ex:100">

                                        <div class="selectvalues-sec" *ngSwitchCase="'select'">
                                            <div *ngFor="let option of item.add_ons_value; let i = index">
                                                <label class="col-form-label">{{ option.values }} Price</label>
                                                <input class="form-control" type="text"
                                                    [formControlName]="getFormControlName(item.add_ons_name+'-'+option.values+'_addons')"
                                                    [ngModel]="getAddonValue(getFormControlName(option.values))"
                                                    placeholder="ex:100">
                                            </div>
                                        </div>

                                        <div class="selectvalues-sec" *ngSwitchCase="'radio'">
                                            <div *ngFor="let option of item.add_ons_value; let i = index">
                                                <label class="col-form-label">{{ option.values }} Price</label>
                                                <input class="form-control" type="text"
                                                    [formControlName]="getFormControlName(item.add_ons_name+'-'+option.values+'_addons')"
                                                    [ngModel]="getAddonValue(getFormControlName(option.values))"
                                                    placeholder="ex:100">
                                            </div>
                                        </div>

                                        <div class="selectvalues-sec" *ngSwitchCase="'checkbox'">
                                            <div *ngFor="let option of item.add_ons_value; let i = index">
                                                <label class="col-form-label">{{ option.values }} Price</label>
                                                <input class="form-control" type="text"
                                                    [formControlName]="getFormControlName(item.add_ons_name+'-'+option.values+'_addons')"
                                                    [ngModel]="getAddonValue(getFormControlName(item.add_ons_name+'-'+option.values+'_addons'))"
                                                    placeholder="ex:100">
                                            </div>
                                        </div>
                                    </ng-container>
                                </div>
                            </div>


                        </div>
                        <div class="form-group mb-0">
                            <div class="product-buttons text-center">
                                <button class="btn btn-primary mr-1" type="submit">Update</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </form>
</div>
